{% extends "portfolio/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center">🚀 Criar Novo Portfólio</h2>
            <form method="post" class="card p-4 shadow border-0">
                {% csrf_token %}

                {# Exibe erros gerais caso existam #}
                {% bootstrap_form_errors form %}

                {% bootstrap_form form %}

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Criar Card</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
