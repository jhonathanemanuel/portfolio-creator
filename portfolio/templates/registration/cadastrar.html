{% extends "portfolio/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Criar sua Conta</h2>
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    {% bootstrap_button button_type="submit" content="Criar Conta Grátis" button_class="btn-success w-100" %}
                </form>
                <p class="mt-3 text-center small">
                    Já tem conta? <a href="{% url 'login' %}">Faça login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
