{% extends "portfolio/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">Entrar no DevShowcase</h2>

                
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{% url 'dashboard' %}">
                    {% bootstrap_form form %}
                    {% bootstrap_button button_type="submit" content="Entrar" button_class="btn-primary w-100" %}
                </form>
                
                <p class="mt-3 text-center">
                    Ainda não tem conta? <a href="{% url 'register' %}">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
